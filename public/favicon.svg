<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-2.5px); }
      }
      @keyframes bgPulse {
        0%, 100% { opacity: 0.18; }
        50%       { opacity: 0.48; }
      }
      @keyframes spark {
        0%, 15%, 85%, 100% { opacity: 0; transform: scale(0.2); }
        40%, 60%            { opacity: 1; transform: scale(1); }
      }
      .note-group {
        animation: float 2.4s ease-in-out infinite;
      }
      .bg-glow {
        animation: bgPulse 2.4s ease-in-out infinite;
      }
      .s1 { animation: spark 2.4s 0.0s  ease-in-out infinite; transform-origin: 25px 7px;  }
      .s2 { animation: spark 2.4s 0.75s ease-in-out infinite; transform-origin: 6px  13px; }
      .s3 { animation: spark 2.4s 1.5s  ease-in-out infinite; transform-origin: 27px 22px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1e1709"/>

  <!-- Soft glow behind note -->
  <circle class="bg-glow" cx="15" cy="18" r="11" fill="#c9922a"/>

  <!-- Eighth note -->
  <g class="note-group">
    <!-- Note head -->
    <ellipse cx="11.5" cy="22.5" rx="4.5" ry="3" fill="#e8b440" transform="rotate(-18 11.5 22.5)"/>
    <!-- Stem -->
    <rect x="15.4" y="9" width="2.1" height="14.5" fill="#e8b440" rx="1.05"/>
    <!-- Flag -->
    <path d="M17.5 9 C23.5 12 22 17.5 17.5 20" stroke="#e8b440" stroke-width="2.1" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Sparkle dots — staggered twinkle -->
  <circle class="s1" cx="25" cy="7"  r="1.6" fill="#ffd875"/>
  <circle class="s2" cx="6"  cy="13" r="1.3" fill="#ffd875"/>
  <circle class="s3" cx="27" cy="22" r="1.1" fill="#ffd875"/>
</svg>
