<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Jaskier's Journal — Entries</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU" crossorigin="anonymous" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body class="app-page">

    <!-- Confirm Delete Dialog -->
    <div class="confirm-overlay" id="confirmOverlay">
      <div class="confirm-dialog" id="confirmDialog">
        <span class="confirm-icon">🗡️</span>
        <h3 class="confirm-title">Burn This Entry?</h3>
        <p class="confirm-desc">Once committed to the flames, it cannot be recovered. Even Geralt can't undo this one.</p>
        <div class="confirm-actions">
          <button class="btn-confirm-cancel" id="confirmCancelBtn">Keep It</button>
          <button class="btn-confirm-delete" id="confirmDeleteBtn">Burn It</button>
        </div>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- App Layout -->
    <div class="app">

      <!-- Top Navbar -->
      <nav class="app-navbar">
        <a href="/" class="app-brand">Jaskier's <span>Journal</span></a>
        <div class="nav-actions">
          <button class="nav-icon-btn save-note hidden" title="Seal this entry">
            <i class="fas fa-save"></i>
          </button>
          <button class="nav-icon-btn new-note" title="New entry">
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </nav>

      <!-- App Body -->
      <div class="app-body">

        <!-- Sidebar -->
        <aside class="sidebar">
          <div class="sidebar-header">
            <div class="search-wrapper">
              <i class="fas fa-search search-icon"></i>
              <input class="search-input" type="text" placeholder="Search the archives..." autocomplete="off" />
            </div>
          </div>
          <div class="sidebar-list" id="noteList"></div>
        </aside>

        <!-- Editor -->
        <main class="editor">
          <div class="editor-header">
            <input
              class="note-title"
              placeholder="Title this entry..."
              maxlength="28"
              type="text"
            />
            <div class="editor-meta">
              <div class="editor-meta-date">
                <i class="fas fa-clock"></i>
                <span class="date-text">—</span>
              </div>
              <div class="editor-action-btns">
                <button class="action-btn btn-edit hidden edit-note">
                  <i class="fas fa-pencil-alt"></i> Edit
                </button>
                <button class="action-btn btn-update hidden update-note">
                  <i class="fas fa-check"></i> Update
                </button>
                <button class="action-btn btn-cancel hidden cancel-edit">
                  Cancel
                </button>
              </div>
            </div>
          </div>

          <div class="editor-body">
            <textarea
              class="note-textarea"
              placeholder="Begin your account here. The Continent won't chronicle itself..."
            ></textarea>
          </div>

          <div class="editor-footer">
            <span class="editor-stat char-count">0 characters</span>
            <span class="editor-stat word-count">0 words</span>
          </div>
        </main>

      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="/assets/js/index.js"></script>
  </body>
</html>
